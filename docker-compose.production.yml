# Stack de produção.
#
# Setup:
#   cp apps/api/.env.example apps/api/.env   # preencher prod (DB, R2, OAuth…)
#   cp apps/web/.env.example apps/web/.env   # preencher prod (URLs públicas)
#   docker compose --env-file apps/web/.env -f docker-compose.production.yml up --build -d
#
# --env-file apps/web/.env expõe NEXT_PUBLIC_API_URL para o build da imagem web.
#
# usar serviços gerenciados externos:
#   docker compose -f docker-compose.production.yml --profile infra up --build -d
#
# Storage em produção: Cloudflare R2 (não inclui MinIO).

name: loreforge-production

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - loreforge

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - loreforge

  postgres:
    profiles: [infra]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_DB: ${POSTGRES_DB:-loreforge}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loreforge}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - loreforge

  redis:
    profiles: [infra]
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - loreforge

networks:
  loreforge:
    name: loreforge-production

volumes:
  postgres_prod_data:
  redis_prod_data:
